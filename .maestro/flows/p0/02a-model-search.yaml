# P0 E2E: 3.1 Search for a model
# Verifies Models tab search works and returns results
# QA_TEST_PLAN §3.1

appId: ${APP_ID}
name: "P0: Model Search"
tags:
  - p0
  - models
  - search
---

- launchApp

# Handle onboarding/model-download if shown
- runFlow:
    when:
      visible:
        id: "onboarding-screen"
    commands:
      - tapOn:
          id: "onboarding-skip"
      - extendedWaitUntil:
          visible:
            id: "model-download-screen"
          timeout: 20000
      - tapOn:
          id: "model-download-skip"

- runFlow:
    when:
      visible:
        id: "model-download-screen"
    commands:
      - tapOn:
          id: "model-download-skip"

# Navigate to Models tab
- extendedWaitUntil:
    visible:
      id: "home-screen"
    timeout: 15000

- tapOn:
    id: "models-tab"

- extendedWaitUntil:
    visible:
      id: "models-screen"
    timeout: 5000

# Step 1: Verify search bar, filter toggle, model list
- assertVisible:
    id: "search-input"
- assertVisible:
    id: "text-filter-toggle"
- assertVisible:
    id: "models-list"

# Step 2: Search for a small model
- tapOn:
    id: "search-input"
- inputText: "SmolLM2-135M"
- hideKeyboard
- tapOn:
    id: "search-button"

# Wait for result cards to load
- extendedWaitUntil:
    visible:
      id: "model-card-0"
    timeout: 15000
