# Editing a chat message: long-press a user message opens the action menu,
# and "Edit" opens the edit sheet with the message text loaded.
#
# Native text selection inside the edit sheet works again since the sheet renders
# via a Portal instead of an RN <Modal> (see AppSheet `usePortal`). Verified
# manually with an onSelectionChange probe: tapping mid-text moves the caret
# (sel -1 -> a mid index). A permanent selection assertion needs a stable a11y
# signal for the caret, which Maestro doesn't expose cleanly yet.
appId: ai.offgridmobile
---
- launchApp
- tapOn:
    id: "conversation-item-0"
- assertVisible:
    id: "user-message"
- longPressOn:
    id: "user-message"
- assertVisible:
    id: "action-edit"
- tapOn:
    id: "action-edit"
- assertVisible:
    id: "edit-input"
